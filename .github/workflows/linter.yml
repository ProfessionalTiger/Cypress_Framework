name: Linter Code Base

on:
  push:
    branches:
      - "main"
      - "feature/*"

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js 16.x
        uses: actions/setup-node@v2
        with:
          node-version: 16.x
      - run: npm install
      - run: npm run lint
      - run: npm run lint:fix 

    